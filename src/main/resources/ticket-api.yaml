openapi: 3.0.0
info:
  title: Sample API
  description: Optional multiline or single-line description in [CommonMark](http://commonmark.org/help/) or HTML.
  version: 0.1.9

paths:
  /tickets:
    post:
      operationId: createTicket
      summary: Create a ticket
      requestBody:
        description: ticket details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequestDto'
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketDto'
components:
  schemas:
    CreateTicketRequestDto:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        issuer:
          type: string
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/CreateSessionRequestDto'
    CreateSessionRequestDto:
      type: object
      properties:
        dueDate:
          type: string
        description:
          type: string
    SessionDto:
      type: object
      properties:
        id:
          type: string
        dueDate:
          type: string
        completionDate:
          type: string
          nullable: true
        description:
          type: string
        isCancelled:
          type: boolean
          default: false
      required:
        - id
        - dueDate
        - description
    TicketDto:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        issuer:
          type: string
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionDto'
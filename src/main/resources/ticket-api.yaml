    post:
      operationId: createTicket
      summary: Create a ticket
      requestBody:
        description: ticket details
        required: true
        content:
          application/json:
            schema:
              $ref: './ticket-component.yaml#/components/schemas/CreateTicketRequestDto'
      responses:
        "200": # status code
          description: A JSON array of user names
          content:
            application/json:
              schema:
                $ref: './ticket-component.yaml#/components/schemas/TicketDto'